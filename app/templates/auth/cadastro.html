<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4a90e2, #357abd);
        }

        .cadastro-box{
            background: white;
            padding: 35px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .cadastro-box h1{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group{
            margin-bottom: 18px;
        }

        .input-group input{
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus{
            border-color: #4a90e2;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4a90e2;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #357abd;
        }

        .login-link{
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .login-link a{
            text-decoration: none;
            color: #4a90e2;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="cadastro-box">

        <h1>Criar Conta</h1>

        <form action="/auth/cadastro" method="post">

            <div class="input-group">
                <input type="text" name="nome" placeholder="Nome completo" required>
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" name="senha" placeholder="Senha" required>
            </div>

            <button type="submit">Cadastrar</button>

        </form>

        <div class="login-link">
            Já tem conta? <a href="/auth/login">Entrar</a>
        </div>

    </div>

</body>
</html>
